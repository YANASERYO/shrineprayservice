<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>祈願予約一覧</title>
</head>
<body>
<h1>祈願予約一覧</h1>
<p>
    <a href="/reservations/new">新しい予約を登録</a>
</p>
<p>
    <a th:href="@{/staff/reservations(filter='today')}">今日の未祈願</a> |
    <a th:href="@{/staff/reservations(filter='future')}">翌日以降の未祈願</a> |
    <a th:href="@{/staff/reservations(filter='prayed')}">祈願済み</a> |
    <a th:href="@{/staff/reservations(filter='all')}">全部</a>
</p>
<table border="1">
    <tr>
        <th>予約番号</th>
        <th>氏名</th>
        <th>かな</th>
        <th>生年月日</th>
<!--    		<th>電話番号</th>-->
<!--			<th>郵便番号</th>-->
        <th>住所</th>
		<th>住所読み</th>
<!--    		<th>メール</th>-->
        <th>祈願希望日</th>
        <th>祈願の種類</th>
		<th>備考</th>
		<th>ステータス</th>
		<th>祈願処理</th>
		<th>詳細</th>
    </tr>

    <tr th:each="reservation : ${reservations}">
        <td th:text="${reservation.id}"></td>
        <td th:text="${reservation.name}"></td>
        <td th:text="${reservation.kana}"></td>
        <td th:text="${reservation.birthdayWareki}"></td>
<!--        <td th:text="${reservation.phone}"></td>-->
<!--			<td th:text="${reservation.postalCode}"></td>-->
        <td th:text="${reservation.address}"></td>
		<td th:text="${reservation.addressKana}"></td>
<!--        <td th:text="${reservation.email}"></td>-->
        <td th:text="${reservation.preferredDate}"></td>
        <td th:text="${reservation.prayerType}"></td>
        <td th:text="${reservation.note}"></td>
		<td th:text="${reservation.prayed ? '祈願済み' : '未祈願'}"></td>
		<td>
			<form th:if="${!reservation.prayed}"
				th:action="@{/staff/reservations/{id}/pray(id=${reservation.id})}"
				method="post">
				<button type="submit">祈願済にする</button>
			</form>
			<span th:if="${reservation.prayed}">完了</span>
		</td>
		<td><a th:href="@{/staff/reservations/{id}(id=${reservation.id})}">詳細</a></td>
    </tr>
</table>
</body>
</html>
