<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/reservation/reservation-complete.css}">
<link rel="stylesheet" th:href="@{/css/responsive.css}">

<title>予約完了</title>
</head>
<body>

<main class="main-container">

    <h1>予約を受け付けました</h1>

    <p class="complete-notice">
        画面のスクリーンショット、又は予約番号を必ずお控えください。
    </p>

    <div class="complete-box">

        <div class="complete-row">
            <div class="complete-label">予約番号</div>
            <div class="complete-value" th:text="${reservationId}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">名前</div>
            <div class="complete-value" th:text="${reservation.name}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">かな</div>
            <div class="complete-value" th:text="${reservation.kana}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">生年月日</div>
            <div class="complete-value" th:text="${reservation.birthday}"></div>
        </div>
		
		<div class="complete-row">
		    <div class="complete-label">性別</div>
		    <div class="complete-value" th:text="${reservation.gender}"></div>
		</div>

        <div class="complete-row">
            <div class="complete-label">電話番号</div>
            <div class="complete-value" th:text="${reservation.phone}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">郵便番号</div>
            <div class="complete-value" th:text="${reservation.postalCode}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">住所</div>
            <div class="complete-value" th:text="${reservation.address}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">メールアドレス</div>
            <div class="complete-value" th:text="${reservation.email}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">祈願希望日</div>
            <div class="complete-value" th:text="${reservation.preferredDate}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">祈願の種類</div>
            <div class="complete-value" th:text="${reservation.prayerType}"></div>
        </div>

        <div class="complete-row">
            <div class="complete-label">備考</div>
            <div class="complete-value" th:text="${reservation.note}"></div>
        </div>

        <div class="complete-actions">
            <a class="complete-link" th:href="@{/reservations/new}">
                確認後、こちらをタップして初期画面に戻る
            </a>
        </div>

    </div>

</main>

</body>
</html>
